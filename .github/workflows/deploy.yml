name: Deploy to cPanel Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout latest code ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # ── 3. Install & Build React frontend ────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install
        working-directory: client

      - name: Build React frontend
        run: npm run build
        working-directory: client
        env:
          CI: false   # Treat warnings as warnings, not errors

      # ── 4. Deploy frontend build via SSH ─────────────────────────────────────
      - name: Deploy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "client/build/*"
          target: ${{ secrets.FRONTEND_PATH }}
          strip_components: 2     # Strips "client/build/" prefix — copies contents directly

      # ── 5. Deploy backend source via SSH ─────────────────────────────────────
      - name: Deploy backend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "server/src,server/app.js,server/server.js,server/package.json,server/package-lock.json"
          target: ${{ secrets.BACKEND_PATH }}
          strip_components: 1     # Strips "server/" prefix

      # ── 6. Install backend dependencies & restart Node app ───────────────────
      - name: Install backend deps & restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.BACKEND_PATH }}
            npm install --production
            pm2 restart ${{ secrets.PM2_APP_NAME }} || pm2 start server.js --name ${{ secrets.PM2_APP_NAME }}
            pm2 save
            echo "✅ Deployment complete at $(date)"
